<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Cycle</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg: #1a1a1e; --surface: #242428; --surface2: #2e2e32;
    --text: #f0ede8; --muted: #9a9790;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; }

  header {
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-family: 'Libre Baskerville', serif; font-size: 16px; font-weight: 400; letter-spacing: -0.02em; }
  header .sub { font-size: 12px; color: var(--muted); }

  .main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

  /* ── Wheel ── */
    .wheel-wrap {
    flex: 0 0 40%;  /* try 55–65% */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    }
  #wheel { display: block; overflow: visible; }

  .node-g { cursor: pointer; }
  .node-g rect { transition: filter 0.15s, stroke-width 0.15s; }
  .node-g text { pointer-events: none; }
  .node-g:hover rect { filter: brightness(1.1); }
  .node-g.phase-active rect { stroke-width: 3.5 !important; filter: brightness(1.18); }
  .centre-g { cursor: pointer; }

  /* ── Right panel ── */
  .info-panel {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Phase header */
  .phase-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .phase-empty-msg { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .badge {
    display: inline-block; padding: 3px 11px; border-radius: 20px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .phase-name {
    font-family: 'Libre Baskerville', serif;
    font-size: 16px; font-weight: 700; line-height: 1.2;
  }

  /* Phase description */
  .phase-desc {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted); line-height: 1.7;
    flex-shrink: 0;
  }

  /* Node grid — 2x2 */
  .node-grid {
    flex: 1; overflow-y: auto;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
  }
  .node-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .node-card-label {
    font-size: 12px; font-weight: 600; line-height: 1.3;
  }
  .node-card-detail {
    font-size: 11px; font-style: italic; color: var(--muted);
  }
  .node-card-desc {
    font-size: 11px; color: var(--muted); line-height: 1.6; margin-top: 3px;
  }
  .node-card-divider {
    height: 1px; background: var(--border); margin: 2px 0;
  }

  .empty-hint {
    grid-column: 1 / -1;
    font-size: 13px; color: var(--muted); line-height: 1.7;
    align-self: center; text-align: center; padding: 20px;
  }

  /* Levels panel */
  .right-side { display: flex; flex: 1; min-width: 0; border-left: 1px solid var(--border); }
  .info-panel { border-left: none; border-right: 1px solid var(--border); }
  .levels-panel {
    flex: 0 0 28%;  min-width: 200px; max-width: 350px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .levels-header {
    padding: 16px 14px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    flex-shrink: 0;
  }
  .levels-list {
    flex: 1; overflow-y: auto;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .level-card {
    padding: 8px 10px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .level-band {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 3px;
  }
  .level-text { font-size: 11px; line-height: 1.5; color: var(--muted); }
  .levels-empty { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .year-toggle {
    display: flex; gap: 4px; margin-bottom: 10px;
  }
  .year-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.04em;
  }
  .year-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .year-btn.active { color: white; border-color: transparent; }

  .node-prog {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 2px;
}

.node-prog-row {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 8px;
  align-items: start;
}

.node-prog-year {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--text);
  opacity: 0.8;
}

.node-prog-text {
  font-size: 10px;
  line-height: 1.5;
  color: var(--muted);
}

.myp-table {
  display: flex;
  flex-direction: column;
  margin-top: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.myp-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}

.myp-row div {
  padding: 8px 10px;
  font-size: 10.5px;
  line-height: 1.45;
  color: var(--muted);
  border-right: 1px solid var(--border);
}

.myp-row div:last-child {
  border-right: none;
}

/* horizontal borders */
.myp-row:not(:last-child) {
  border-bottom: 1px solid var(--border);
}

/* header row */
.myp-row.header {
  background: var(--surface2);
}

.myp-row.header div {
  font-weight: 600;
  color: var(--text);
  font-size: 10px;
  letter-spacing: 0.04em;
}

/* zebra striping */
.myp-row:nth-child(even):not(.header) {
  background: rgba(255,255,255,0.02);
}

.overview {
  display: flex;
  flex-direction: column;
  gap: 18px;
  grid-column: 1 / -1;
}

.overview-section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.overview-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  
  
}

.overview-text {
  font-size: 12px;
  line-height: 1.7;
  color: var(--muted);
}

.overview-quote {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  font-style: italic;
  border-left: 2px solid var(--border);
  padding-left: 10px;
  margin: 6px 0 4px;
}
</style>
</head>
<body>

<header>
  <h1 id="h-title">MYP Cycle</h1>
  <span class="sub" id="h-sub"></span>
</header>

<div class="main">

  <div class="wheel-wrap"><svg id="wheel"></svg></div>

  <div class="right-side">
  <div class="info-panel">
    <div class="phase-header" id="phase-header">
      <p class="phase-empty-msg">Select a phase from the diagram to explore.</p>
    </div>
    <div class="phase-desc" id="phase-desc" style="display:none;"></div>
    <div class="node-grid" id="node-grid">
      <p class="empty-hint">The Design Cycle is iterative — phases are interdependent and students may move between them at any point.</p>
    </div>
  </div>

  <div class="levels-panel">
    <div class="levels-header">Achievement levels
      <div class="year-toggle" id="year-toggle"><button class="year-btn active" data-year="y1">Y1</button><button class="year-btn" data-year="y3">Y3</button><button class="year-btn" data-year="y5">Y5</button></div>
    </div>
    <div class="levels-list" id="levels-list">
      <p class="levels-empty">Select a phase to see achievement level descriptors.</p>
    </div>
  </div>

  </div><!-- end right-side -->

</div>

<script>
const DATA_URL = './myp_design_cycle.json';

async function init() {
  const response = await fetch(DATA_URL);
  const data = await response.json();
  build(data);
}

init();
//fetch(DATA_URL).then(r => r.json()).then(build);

function build(data) {
  document.getElementById('h-title').textContent = data.title || 'MYP Cycle';
  document.getElementById('h-sub').textContent   = data.subtitle || '';

  const nodes = [];
  data.phases.forEach((phase, pi) => {
    phase.nodes.forEach((node, ni) => {
      nodes.push({ id:`${phase.id}-${ni}`, phase, phaseIdx:pi, nodeIdx:ni, node });
    });
  });

  // Canvas
  const H  = Math.min(window.innerHeight - 46, 660);
  const W  = H;
  const CX = W/2, CY = H/2;

  const NW = W*0.155, NH = W*0.132, GAP = W*0.015, CORNER = 10;
  const BW = NW*2+GAP, BH = NH*2+GAP;
  const DIST = W*0.345;

  const anchors = [
    {cx:CX,       cy:CY-DIST},
    {cx:CX+DIST,  cy:CY     },
    {cx:CX,       cy:CY+DIST},
    {cx:CX-DIST,  cy:CY     },
  ];
  const gridOffsets = [{col:0,row:0},{col:1,row:0},{col:0,row:1},{col:1,row:1}];

  nodes.forEach(n => {
    const a = anchors[n.phaseIdx], o = gridOffsets[n.nodeIdx];
    n.x = a.cx - BW/2 + o.col*(NW+GAP) + NW/2;
    n.y = a.cy - BH/2 + o.row*(NH+GAP) + NH/2;
  });

  const svg = d3.select('#wheel').attr('width',W).attr('height',H);

  // Centre circle
  const CR = W*0.125;
  const cg = svg.append('g').attr('class','centre-g')
    .attr('transform',`translate(${CX},${CY})`).on('click', clearSel);
  cg.append('circle').attr('r',CR)
    .attr('fill','#e8e4dc').attr('stroke','rgba(255,255,255,0.1)').attr('stroke-width',1.5);
  const titleWords = (data.title||'MYP Design Cycle').split(' ');
  const tmid = Math.ceil(titleWords.length/2);
  const tLines = [titleWords.slice(0,tmid).join(' '), titleWords.slice(tmid).join(' ')].filter(Boolean);
  const tfs = W*0.023;
  tLines.forEach((line,i) => {
    cg.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family','Libre Baskerville').attr('font-weight','700')
      .attr('font-size',tfs).attr('fill','#2c2c2a')
      .attr('y',(i-(tLines.length-1)/2)*tfs*1.3).text(line);
  });

  // Phase labels between centre and blocks
  const labelFs = W*0.021, lh = labelFs*1.3;
  data.phases.forEach((phase, pi) => {
    const lines = phase.label.split('\n');
    const gapMid = CR + (DIST - BH/2 - CR)*0.35;
    let tx,ty,rot;
    if (pi===0){tx=CX;        ty=CY-gapMid; rot=0;  }
    if (pi===1){tx=CX+gapMid; ty=CY;        rot=90; }
    if (pi===2){tx=CX;        ty=CY+gapMid; rot=0;  }
    if (pi===3){tx=CX-gapMid; ty=CY;        rot=-90;}
    const el = svg.append('text')
      .attr('font-family','Libre Baskerville').attr('font-weight','700')
      .attr('font-size',labelFs).attr('fill',phase.color)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('transform',`translate(${tx},${ty}) rotate(${rot})`);
    lines.forEach((line,li) => {
      el.append('tspan').attr('x',0).attr('dy', li===0 ? -(lines.length-1)*lh/2 : lh).text(line);
    });
  });

  // Nodes
  const lfs = Math.min(W*0.020,12), dfs = Math.min(W*0.017,10), lh2 = lfs*1.22;
  function wrap(text, maxCh) {
    const words=text.split(' '), lines=[]; let cur='';
    words.forEach(w => {
      const t = cur?cur+' '+w:w;
      if (t.length>maxCh && cur){lines.push(cur);cur=w;}else cur=t;
    });
    if(cur)lines.push(cur); return lines;
  }

  let activePhaseId = null;

  const nodeGs = svg.selectAll('.node-g')
    .data(nodes).enter()
    .append('g').attr('class','node-g')
    .attr('transform', d=>`translate(${d.x},${d.y})`)
    .on('click', (e,d) => selectPhase(d.phase.id));

  nodeGs.append('rect')
    .attr('x',-NW/2).attr('y',-NH/2)
    .attr('width',NW).attr('height',NH)
    .attr('rx',CORNER).attr('ry',CORNER)
    .attr('fill', d=>d.phase.color)
    .attr('stroke', d=>d.phase.light)
    .attr('stroke-width',2);

  nodeGs.each(function(d) {
    const g = d3.select(this);
    const mc = Math.floor(NW/(lfs*0.52));
    const ll = wrap(d.node.label,mc), dl = wrap(d.node.detail,mc+2);
    const th = ll.length*lh2 + dl.length*lh2*0.92 + lh2*0.25;
    let y = -th/2 + lh2*0.5;
    ll.forEach(line => {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y',y).attr('font-size',lfs).attr('font-weight',600)
        .attr('font-family','DM Sans').attr('fill','white').text(line);
      y += lh2;
    });
    y += lh2*0.12;
    dl.forEach(line => {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y',y).attr('font-size',dfs).attr('font-style','italic')
        .attr('font-family','DM Sans').attr('fill',d.phase.light).text(line);
      y += lh2*0.92;
    });
  });

  // ── Interaction ──
  // ── Year toggle ──
  let activeYear = 'y1';
  let activePhase = null;

  document.getElementById('year-toggle').addEventListener('click', e => {
    const btn = e.target.closest('.year-btn');
    if (!btn) return;
    activeYear = btn.dataset.year;
    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (activePhase) renderLevels(activePhase);
  });

  function renderLevels(phase) {
    activePhase = phase;
    const levelsList = document.getElementById('levels-list');
    levelsList.innerHTML = '';
    const lvls = phase.levels[activeYear] || [];
    lvls.forEach(lv => {
      const card = document.createElement('div');
      card.className = 'level-card';
      card.innerHTML = `<div class="level-band" style="color:${phase.light}">${lv.band}</div><div class="level-text">${lv.text}</div>`;
      levelsList.appendChild(card);
    });
    // Colour active year button to phase colour
    document.querySelectorAll('.year-btn').forEach(b => {
      b.style.background = b.dataset.year === activeYear ? phase.color : '';
    });
  }

  function selectPhase(phaseId) {
    if (activePhaseId === phaseId) return;
    activePhaseId = phaseId;
    updateWheel();
    renderPhase(data.phases.find(p => p.id === phaseId));
  }

  function clearSel() {
    activePhaseId = null;
    updateWheel();
    document.getElementById('phase-header').innerHTML = `
        <div class="phase-name">MYP Design Overview</div>
        `;

        const descEl = document.getElementById('phase-desc');
        descEl.style.display = '';
        descEl.innerHTML = `
        Select a phase from the diagram to explore or click on the MYP Design Cycle to return to this overview section.
        `;

        document.getElementById('node-grid').innerHTML = `
            <div class="overview">

                <div class="overview-section">
                <div class="overview-title">Programme Model</div>
                <div class="overview-quote">
                    The MYP is flexible enough to accommodate the demands of most national or local curriculums.
                </div>
                <div class="overview-text">
                    The programme is structured around concepts, global contexts and approaches to learning (ATL).
                    Learning is inquiry-based and connected to real-world contexts.
                </div>
                </div>

                <div class="overview-section">
                <div class="overview-title">Nature of Design</div>
                <div class="overview-quote">
                    MYP design challenges all students to apply practical and creative thinking skills to solve design problems.
                </div>
                <div class="overview-text">
                    Design involves identifying problems, exploring design ideas, developing solutions and evaluating outcomes.
                </div>
                </div>

                <div class="overview-section">
                <div class="overview-title">Design Cycle</div>
                <div class="overview-quote">
                    It is important to note that, while the design cycle includes several successive stages, the design cycle is an iterative and cyclical process.
                </div>
                <div class="overview-text">
                    Students move freely and flexibly within and between phases, revisiting strands as they refine ideas, test solutions and respond to feedback.
                </div>
                </div>

                <div class="overview-section">
                <div class="overview-title">Curriculum Planning</div>
                <div class="overview-text">
                    Table 1 shows how the teaching and learning experiences and the students’ expected outcomes in design should progress from the earlier years to the final years of the MYP.
                </div>

                <div class="myp-table">
                    <div class="myp-row header">
                    <div>MYP year 1</div>
                    <div>MYP year 3</div>
                    <div>MYP year 5</div>
                    </div>

                    <div class="myp-row">
                    <div>Emphasis placed on individual strands of the objectives.</div>
                    <div>Emphasis placed on addressing individual objectives.</div>
                    <div>The objectives are fully addressed.</div>
                    </div>

                    <div class="myp-row">
                    <div>Students explore contrived, teacher-led design challenges set in familiar contexts.</div>
                    <div>Students explore identified, real-life problems set in familiar and unfamiliar contexts.</div>
                    <div>Students independently explore complex real-life problems set in unfamiliar contexts.</div>
                    </div>

                    <div class="myp-row">
                    <div>Students design for themselves.</div>
                    <div>Students design products for familiar groups of people.</div>
                    <div>Students design products for a client or an identified target audience.</div>
                    </div>
                </div>

                </div>

            </div>
            `;
    
  }

  function updateWheel() {
    svg.selectAll('.node-g').each(function(d) {
      d3.select(this).classed('phase-active', d.phase.id === activePhaseId);
    });
  }

  function renderPhase(phase) {
    // Header
    document.getElementById('phase-header').innerHTML = `
      <span class="badge" style="background:${phase.color}33;color:${phase.light};border:1px solid ${phase.color}66">${phase.criterion}</span>
      <div class="phase-name" style="color:${phase.light};margin-top:4px;">${phase.label.replace(/\n/g,' ')}</div>`;

    // Phase description
    const descEl = document.getElementById('phase-desc');
    descEl.style.display = '';
    descEl.textContent = phase.description;

    // Levels
    renderLevels(phase);

    // 2×2 node cards
    const grid = document.getElementById('node-grid');
    grid.innerHTML = '';
    phase.nodes.forEach(node => {
      const card = document.createElement('div');
      card.className = 'node-card';
      card.style.borderColor = phase.color + '55';
      card.innerHTML = `
        <div class="node-card-label" style="color:${phase.light}">${node.label}</div>
        <div class="node-card-detail">${node.detail}</div>
        <div class="node-card-divider"></div>
        <div class="node-card-desc">${node.description || ''}</div>
        <div class="node-card-divider"></div>
        <div class="node-prog">
            <div class="node-prog-row"><span class="node-prog-year">Y1</span><span class="node-prog-text">${node.progression?.y1 || ''}</span></div>
            <div class="node-prog-row"><span class="node-prog-year">Y3</span><span class="node-prog-text">${node.progression?.y3 || ''}</span></div>
            <div class="node-prog-row"><span class="node-prog-year">Y5</span><span class="node-prog-text">${node.progression?.y5 || ''}</span></div>
        </div>`;
      grid.appendChild(card);
    });
  }
  clearSel();
}
</script>
</body>
</html>
