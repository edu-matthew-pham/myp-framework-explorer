<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Learning Maps</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg: #1a1a1e; --surface: #242428; --surface2: #2e2e32;
    --text: #f0ede8; --muted: #9a9790;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; }

  header {
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-family: 'Libre Baskerville', serif; font-size: 16px; font-weight: 400; letter-spacing: -0.02em; }
  header .sub { font-size: 12px; color: var(--muted); }

  .main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

  .wheel-wrap {
    flex: 0 0 38%;
    display: flex; align-items: center; justify-content: center;
    padding: 10px;
  }
  #wheel { display: block; overflow: visible; }

  .node-g { cursor: pointer; }
  .node-g rect { transition: filter 0.15s, stroke-width 0.15s; }
  .node-g text { pointer-events: none; }
  .node-g:hover rect { filter: brightness(1.1); }
  .node-g.phase-active rect { stroke-width: 3.5 !important; filter: brightness(1.18); }
  .centre-g { cursor: pointer; }

  /* Right side */
  .right-side { display: flex; flex: 1; min-width: 0; border-left: 1px solid var(--border); }

  .info-panel {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .phase-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .phase-empty-msg { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .badge {
    display: inline-block; padding: 3px 11px; border-radius: 20px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .phase-name { font-family: 'Libre Baskerville', serif; font-size: 16px; font-weight: 700; line-height: 1.2; }

  .phase-desc {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted); line-height: 1.7; flex-shrink: 0;
  }

  .node-grid {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(46%, 1fr)); grid-auto-rows: min-content; gap: 10px;
  }
  .node-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .node-card-label { font-size: 12px; font-weight: 600; line-height: 1.3; }
  .node-card-detail { font-size: 11px; font-style: italic; color: var(--muted); }
  .node-card-desc { font-size: 11px; color: var(--muted); line-height: 1.6; margin-top: 3px; }
  .node-card-divider { height: 1px; background: var(--border); margin: 2px 0; }

  .node-prog { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }
  .node-prog-row { display: grid; grid-template-columns: 28px 1fr; gap: 8px; align-items: start; }
  .node-prog-year { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: var(--text); opacity: 0.8; }
  .node-prog-text { font-size: 10px; line-height: 1.5; color: var(--muted); }

  /* Levels panel */
  .levels-panel {
    flex: 0 0 32%; min-width: 200px; max-width: 350px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .levels-header {
    padding: 16px 14px 10px; border-bottom: 1px solid var(--border);
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); flex-shrink: 0;
  }
  .year-toggle { display: flex; gap: 4px; margin-top: 8px; }
  .year-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.04em;
  }
  .year-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .year-btn.active { color: white; border-color: transparent; }

  .levels-intro {
    padding: 12px 12px 10px; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02); flex-shrink: 0;
  }
  .levels-intro-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text); margin-bottom: 8px;
  }
  .levels-intro-body { font-size: 11px; line-height: 1.6; color: var(--muted); margin-bottom: 8px; }
  .levels-intro-body ul { margin: 4px 0 4px 16px; }
  .levels-intro-body li { margin-bottom: 2px; color: var(--text); }
  .levels-intro-req {
    font-size: 10.5px; line-height: 1.55; color: var(--muted);
    border-left: 2px solid var(--border); padding-left: 8px; font-style: italic;
  }

  .levels-list {
    flex: 1; overflow-y: auto; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .level-card {
    padding: 8px 10px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .level-band { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .level-text { font-size: 11px; line-height: 1.5; color: var(--muted); }
  .levels-empty { font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* ── Foundations panel (Principles of Practice mode) ── */
  .found-tabs { display: flex; gap: 2px; margin-top: 8px; flex-wrap: wrap; }
  .found-tab-btn {
    padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.04em; white-space: nowrap;
  }
  .found-tab-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .found-tab-btn.active { background: #5a7a9a; color: white; border-color: transparent; }

  .found-intro { font-size: 11px; line-height: 1.6; color: var(--muted); margin-bottom: 10px; font-style: italic; }
  .found-attr { display: flex; flex-direction: column; gap: 6px; }
  .found-attr-card {
    padding: 8px 10px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .found-attr-name { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .found-attr-desc { font-size: 10.5px; line-height: 1.5; color: var(--muted); }

  .found-formula {
    font-size: 11px; font-weight: 600; color: var(--text);
    background: var(--surface2); border-radius: 6px;
    padding: 8px 10px; margin-bottom: 10px; line-height: 1.5; letter-spacing: 0.01em;
  }
  .found-criteria { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .found-criterion {
    padding: 7px 10px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .found-criterion-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); margin-bottom: 2px; }
  .found-criterion-text { font-size: 10.5px; line-height: 1.5; color: var(--muted); }
  .found-connection {
    font-size: 10.5px; line-height: 1.6; color: var(--muted);
    border-left: 2px solid var(--border); padding-left: 8px; margin-bottom: 8px;
  }
  .found-note {
    font-size: 10px; line-height: 1.5; color: var(--muted); font-style: italic;
    opacity: 0.7;
  }

  .found-gq-phase { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .found-gq-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text); padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  .found-gq-list { display: flex; flex-direction: column; gap: 4px; }
  .found-gq-item {
    font-size: 10.5px; line-height: 1.5; color: var(--muted);
    padding: 4px 8px; border-radius: 5px; background: var(--surface);
    border-left: 2px solid var(--border);
  }

  /* Overview (rendered from JSON) */
  .overview { display: flex; flex-direction: column; gap: 18px; grid-column: 1 / -1; }
  .overview-section { display: flex; flex-direction: column; gap: 6px; }
  .overview-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .overview-quote {
    font-size: 12px; line-height: 1.7; color: var(--text); font-style: italic;
    border-left: 2px solid var(--border); padding-left: 10px; margin: 2px 0;
  }
  .overview-text { font-size: 12px; line-height: 1.7; color: var(--muted); }

  .gen-table {
    display: flex; flex-direction: column; margin-top: 6px;
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .gen-row { display: grid; }
  .gen-row div {
    padding: 7px 10px; font-size: 10.5px; line-height: 1.45; color: var(--muted);
    border-right: 1px solid var(--border);
  }
  .gen-row div:last-child { border-right: none; }
  .gen-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .gen-row.header { background: var(--surface2); }
  .gen-row.header div { font-weight: 600; color: var(--text); font-size: 10px; letter-spacing: 0.04em; }
  .gen-row:nth-child(even):not(.header) { background: rgba(255,255,255,0.02); }

  .concept-table .gen-row div { text-align: center; }

  /* ── Subject tabs ── */
  .tab-bar {
    display: flex; align-items: center; gap: 2px;
    padding: 0 16px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    overflow-x: auto;
  }
  .tab-btn {
    padding: 9px 16px; font-size: 12px; font-weight: 500;
    color: var(--muted); background: transparent; border: none;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-btn.soon { opacity: 0.35; cursor: default; }

  /* tab separator */
  .tab-sep {
    width: 1px; height: 18px; background: var(--border);
    flex-shrink: 0; margin: 0 6px; align-self: center;
  }
</style>
</head>
<body>

<header>
  <h1>MYP Learning Maps</h1>
</header>
<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" data-json="myp_principles_cycle.json">From Principles into Practice</button>
  <div class="tab-sep"></div>
  <button class="tab-btn" data-json="myp_design_cycle.json">Design</button>
  <button class="tab-btn" data-json="myp_arts_cycle.json">Arts</button>
  <button class="tab-btn" data-json="myp_science_cycle.json">Sciences</button>
  <button class="tab-btn" data-json="myp_pe_cycle.json">Physical &amp; Health Ed</button>
  <button class="tab-btn" data-json="myp_lang_acq_cycle.json">Language Acq</button>
  <button class="tab-btn" data-json="myp_english_cycle.json">Language &amp; Lit</button>
  <button class="tab-btn" data-json="myp_hass_cycle.json">Individuals &amp; Soc</button>
  <button class="tab-btn" data-json="myp_maths_cycle.json">Mathematics</button>
</div>

<div class="main">
  <div class="wheel-wrap"><svg id="wheel"></svg></div>

  <div class="right-side">
    <div class="info-panel">
      <div class="phase-header" id="phase-header"></div>
      <div class="phase-desc" id="phase-desc" style="display:none;"></div>
      <div class="node-grid" id="node-grid"></div>
    </div>

    <div class="levels-panel">
      <div class="levels-header" id="levels-header">
        Achievement levels
        <div class="year-toggle" id="year-toggle">
          <button class="year-btn active" data-year="y1">Y1</button>
          <button class="year-btn" data-year="y3">Y3</button>
          <button class="year-btn" data-year="y5">Y5</button>
        </div>
      </div>
      <div class="levels-intro" id="levels-intro"></div>
      <div class="levels-list" id="levels-list">
        <p class="levels-empty">Select a phase to see descriptors.</p>
      </div>
    </div>
  </div>
</div>

<script>
function loadSubject(jsonFile) {
  fetch('./' + jsonFile).then(r => r.json()).then(data => {
    // Reset wheel SVG
    d3.select('#wheel').selectAll('*').remove();
    // Reset panels
    document.getElementById('phase-header').innerHTML = '';
    document.getElementById('phase-desc').style.display = 'none';
    document.getElementById('node-grid').innerHTML = '';
    document.getElementById('levels-list').innerHTML = '<p class="levels-empty">Select a phase to see descriptors.</p>';
    document.getElementById('levels-intro').innerHTML = '';

    const levelsHeaderEl = document.getElementById('levels-header');
    const panelTitle = (data.levels_panel_title || 'Achievement levels');

    if (data.levels_panel_mode === 'foundations' && data.foundations) {
      // ── Foundations mode: three static tabs, no year buttons ──
      const tabs = data.foundations.tabs || [];
      const tabsHTML = tabs.map((t, i) =>
        `<button class="found-tab-btn${i===0?' active':''}" data-fi="${i}">${t}</button>`
      ).join('');
      levelsHeaderEl.innerHTML = panelTitle +
        `<div class="found-tabs" id="found-tabs">${tabsHTML}</div>`;

      // Show assessment_overview in intro if present
      if (data.assessment_overview) {
        document.getElementById('levels-intro').innerHTML =
          `<div class="levels-intro-req">${data.assessment_overview.requirement}</div>`;
      }

      // Render first tab immediately
      activeFoundTab = 0;
      renderFoundations(data.foundations, 0);

      // Bind tab clicks
      document.getElementById('found-tabs').addEventListener('click', e => {
        const btn = e.target.closest('.found-tab-btn');
        if (!btn) return;
        activeFoundTab = parseInt(btn.dataset.fi);
        document.querySelectorAll('.found-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFoundations(data.foundations, activeFoundTab);
      });

    } else {
      // ── Standard mode: Y1/Y3/Y5 achievement levels ──
      const toggleHTML = `<div class="year-toggle" id="year-toggle">
        <button class="year-btn active" data-year="y1">Y1</button>
        <button class="year-btn" data-year="y3">Y3</button>
        <button class="year-btn" data-year="y5">Y5</button>
      </div>`;
      levelsHeaderEl.innerHTML = panelTitle + toggleHTML;

      if (data.assessment_overview) {
        const ao = data.assessment_overview;
        document.getElementById('levels-intro').innerHTML = `
          <div class="levels-intro-title">Panel Overview</div>
          <div class="levels-intro-body">${ao.intro.replace(
            /limited \(1–2\), adequate \(3–4\), substantial \(5–6\), and excellent \(7–8\)/,
            'performance that is:<ul><li>limited (1–2)</li><li>adequate (3–4)</li><li>substantial (5–6)</li><li>excellent (7–8)</li></ul>'
          )}</div>
          <div class="levels-intro-req">${ao.requirement}</div>`;
      }

      document.getElementById('year-toggle').addEventListener('click', e => {
        const btn = e.target.closest('.year-btn');
        if (!btn) return;
        activeYear = btn.dataset.year;
        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (activePhase) renderLevels(activePhase);
      });
    }

    build(data);
  });
}

// Tab click handler
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn || btn.classList.contains('soon')) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadSubject(btn.dataset.json);
});

// Initial load
loadSubject('myp_principles_cycle.json');

// State — module scope so panel rebinds can access
let activeYear = 'y1';
let activePhase = null;
let activeFoundTab = 0;

function build(data) {

  // ── Flatten nodes ──
  const nodes = [];
  data.phases.forEach((phase, pi) => {
    phase.nodes.forEach((node, ni) => {
      nodes.push({ id:`${phase.id}-${ni}`, phase, phaseIdx:pi, nodeIdx:ni, node });
    });
  });

  // ── Canvas ──
  const H  = Math.min(window.innerHeight - 46, 660);
  const W  = H, CX = W/2, CY = H/2;
  const NW = W*0.155, NH = W*0.132, GAP = W*0.015, CORNER = 10;
  const BW = NW*2+GAP, BH = NH*2+GAP;
  const DIST = W * 0.345;

  const anchors = [
    {cx:CX,      cy:CY-DIST},
    {cx:CX+DIST, cy:CY      },
    {cx:CX,      cy:CY+DIST},
    {cx:CX-DIST, cy:CY      },
  ];

  function phaseOffsets(count, phaseIdx) {
    const isHoriz = (phaseIdx === 0 || phaseIdx === 2);
    const offsets = [];
    if (isHoriz) {
      const cols = Math.ceil(count / 2);
      for (let i = 0; i < count; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const rowCount = row === Math.floor((count-1)/cols) && count % cols !== 0 ? count % cols : cols;
        const colOffset = rowCount < cols ? col + (cols - rowCount) / 2 : col;
        offsets.push({ col: colOffset, row, totalCols: cols, totalRows: Math.ceil(count/cols) });
      }
    } else {
      const rows = Math.ceil(count / 2);
      for (let i = 0; i < count; i++) {
        const row = Math.floor(i / 2);
        const col = i % 2;
        const rowSize = row === rows - 1 && count % 2 !== 0 ? 1 : 2;
        const colOffset = rowSize === 1 ? 0.5 : col;
        offsets.push({ col: colOffset, row, totalCols: 2, totalRows: rows });
      }
    }
    return offsets;
  }

  nodes.forEach(n => {
    const a = anchors[n.phaseIdx];
    const phaseNodes = nodes.filter(x => x.phaseIdx === n.phaseIdx);
    const offsets = phaseOffsets(phaseNodes.length, n.phaseIdx);
    const o = offsets[n.nodeIdx];
    const blockW = o.totalCols * NW + (o.totalCols - 1) * GAP;
    const blockH = o.totalRows * NH + (o.totalRows - 1) * GAP;
    n.x = a.cx - blockW/2 + o.col * (NW + GAP) + NW/2;
    n.y = a.cy - blockH/2 + o.row * (NH + GAP) + NH/2;
  });

  const svg = d3.select('#wheel').attr('width',W).attr('height',H);

  // Centre circle
  const CR = W*0.125;
  const cg = svg.append('g').attr('class','centre-g')
    .attr('transform',`translate(${CX},${CY})`).on('click', clearSel);
  cg.append('circle').attr('r',CR)
    .attr('fill','#e8e4dc').attr('stroke','rgba(255,255,255,0.1)').attr('stroke-width',1.5);
  const titleWords = (data.title||'MYP').split(' ');
  const tmid = Math.ceil(titleWords.length/2);
  const tLines = [titleWords.slice(0,tmid).join(' '), titleWords.slice(tmid).join(' ')].filter(Boolean);
  const tfs = W*0.023;
  tLines.forEach((line,i) => {
    cg.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family','Libre Baskerville').attr('font-weight','700')
      .attr('font-size',tfs).attr('fill','#2c2c2a')
      .attr('y',(i-(tLines.length-1)/2)*tfs*1.3).text(line);
  });

  // Phase labels
  const labelFs = W*0.021, lh = labelFs*1.3;
  data.phases.forEach((phase, pi) => {
    const lines = phase.label.split('\n');
    const gapMid = CR + (DIST - BH/2 - CR)*0.35;
    let tx,ty,rot;
    if (pi===0){tx=CX;        ty=CY-gapMid; rot=0;  }
    if (pi===1){tx=CX+gapMid; ty=CY;        rot=90; }
    if (pi===2){tx=CX;        ty=CY+gapMid; rot=0;  }
    if (pi===3){tx=CX-gapMid; ty=CY;        rot=-90;}
    const el = svg.append('text')
      .attr('font-family','Libre Baskerville').attr('font-weight','700')
      .attr('font-size',labelFs).attr('fill',phase.color)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('transform',`translate(${tx},${ty}) rotate(${rot})`);
    lines.forEach((line,li) => {
      el.append('tspan').attr('x',0).attr('dy', li===0 ? -(lines.length-1)*lh/2 : lh).text(line);
    });
  });

  // Nodes
  const lfs = Math.min(W*0.020,12), dfs = Math.min(W*0.017,10), lh2 = lfs*1.22;
  function wrap(text, maxCh) {
    const words=text.split(' '), lines=[]; let cur='';
    words.forEach(w => {
      const t = cur?cur+' '+w:w;
      if (t.length>maxCh && cur){lines.push(cur);cur=w;}else cur=t;
    });
    if(cur)lines.push(cur); return lines;
  }

  let activePhaseId = null;
  const nodeGs = svg.selectAll('.node-g').data(nodes).enter()
    .append('g').attr('class','node-g')
    .attr('transform', d=>`translate(${d.x},${d.y})`)
    .on('click', (e,d) => selectPhase(d.phase.id));

  nodeGs.append('rect')
    .attr('x',-NW/2).attr('y',-NH/2).attr('width',NW).attr('height',NH)
    .attr('rx',CORNER).attr('ry',CORNER)
    .attr('fill', d=>d.phase.color).attr('stroke', d=>d.phase.light).attr('stroke-width',2);

  nodeGs.each(function(d) {
    const g = d3.select(this);
    const mc = Math.floor(NW/(lfs*0.52));
    const ll = wrap(d.node.label,mc), dl = wrap(d.node.detail,mc+2);
    const th = ll.length*lh2 + dl.length*lh2*0.92 + lh2*0.25;
    let y = -th/2 + lh2*0.5;
    ll.forEach(line => {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y',y).attr('font-size',lfs).attr('font-weight',600)
        .attr('font-family','DM Sans').attr('fill','white').text(line);
      y += lh2;
    });
    y += lh2*0.12;
    dl.forEach(line => {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y',y).attr('font-size',dfs).attr('font-style','italic')
        .attr('font-family','DM Sans').attr('fill',d.phase.light).text(line);
      y += lh2*0.92;
    });
  });

  function renderLevels(phase) {
    if (data.levels_panel_mode === 'foundations') return;
    activePhase = phase;
    const list = document.getElementById('levels-list');
    list.innerHTML = '';
    const lvls = (phase.levels && phase.levels[activeYear]) || [];
    lvls.forEach(lv => {
      const card = document.createElement('div');
      card.className = 'level-card';
      card.innerHTML = `<div class="level-band" style="color:${phase.light}">${lv.band}</div><div class="level-text">${lv.text}</div>`;
      list.appendChild(card);
    });
    document.querySelectorAll('.year-btn').forEach(b => {
      b.style.background = b.dataset.year === activeYear ? phase.color : '';
    });
  }

  function clearLevels() {
    activePhase = null;
    // In foundations mode the panel is always populated — don't reset it
    if (data.levels_panel_mode !== 'foundations') {
      document.getElementById('levels-list').innerHTML = '<p class="levels-empty">Select a phase to see descriptors.</p>';
      document.querySelectorAll('.year-btn').forEach(b => { b.style.background = ''; });
    }
  }

  // ── Generic table builder ──
  function buildTable(tableData, cols, cls='') {
    const wrap = document.createElement('div');
    wrap.className = 'gen-table' + (cls ? ' '+cls : '');
    const hRow = document.createElement('div');
    hRow.className = 'gen-row header';
    hRow.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    tableData.headers.forEach(h => {
      const d = document.createElement('div'); d.textContent = h; hRow.appendChild(d);
    });
    wrap.appendChild(hRow);
    tableData.rows.forEach(row => {
      const r = document.createElement('div');
      r.className = 'gen-row';
      r.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      row.forEach(cell => {
        const d = document.createElement('div'); d.textContent = cell; r.appendChild(d);
      });
      wrap.appendChild(r);
    });
    return wrap;
  }

  // ── Build concepts block ──
  function buildConcepts(concepts) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin-top:6px;';

    const keyRow = document.createElement('div');
    keyRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;';
    concepts.key.forEach((k, ki) => {
      const def = concepts.key_definitions && concepts.key_definitions[ki]
                  ? concepts.key_definitions[ki].definition : '';
      const pill = document.createElement('span');
      pill.textContent = k;
      const hasTooltip = def.length > 0;
      pill.style.cssText = `padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text);letter-spacing:0.03em;${hasTooltip ? 'cursor:help;' : ''}`;
      if (hasTooltip) {
        pill.addEventListener('mouseenter', () => showTip(pill, def));
        pill.addEventListener('mouseleave', hideTip);
      }
      keyRow.appendChild(pill);
    });
    wrap.appendChild(keyRow);

    concepts.related.forEach(group => {
      const groupWrap = document.createElement('div');
      groupWrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
      const label = document.createElement('div');
      label.textContent = group.label;
      label.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);';
      groupWrap.appendChild(label);
      const pills = document.createElement('div');
      pills.style.cssText = 'display:flex;gap:5px;flex-wrap:wrap;';
      group.items.forEach(item => {
        const name = typeof item === 'object' ? item.name : item;
        const def  = typeof item === 'object' ? item.definition : '';
        const p = document.createElement('span');
        p.textContent = name;
        const hasTooltip = def && def.length > 0;
        p.style.cssText = `padding:2px 9px;border-radius:20px;font-size:10.5px;background:var(--surface);border:1px solid var(--border);color:var(--muted);${hasTooltip ? 'cursor:help;' : ''}`;
        if (hasTooltip) {
          p.addEventListener('mouseenter', () => showTip(p, def));
          p.addEventListener('mouseleave', hideTip);
        }
        pills.appendChild(p);
      });
      groupWrap.appendChild(pills);
      wrap.appendChild(groupWrap);
    });

    return wrap;
  }

  // ── Render overview from JSON ──
  function renderOverview(ov) {
    document.getElementById('phase-header').innerHTML =
      `<div class="phase-name">${ov.title}</div>`;
    const descEl = document.getElementById('phase-desc');
    descEl.style.display = '';
    descEl.textContent = ov.description;

    const grid = document.getElementById('node-grid');
    grid.innerHTML = '';

    const container = document.createElement('div');
    container.className = 'overview';

    ov.sections.forEach(sec => {
      const secEl = document.createElement('div');
      secEl.className = 'overview-section';

      const title = document.createElement('div');
      title.className = 'overview-title';
      title.textContent = sec.title;
      secEl.appendChild(title);

      if (sec.quote) {
        const q = document.createElement('div');
        q.className = 'overview-quote';
        q.textContent = sec.quote;
        secEl.appendChild(q);
      }
      if (sec.text) {
        const t = document.createElement('div');
        t.className = 'overview-text';
        t.textContent = sec.text;
        secEl.appendChild(t);
      }
      if (sec.progression_table) {
        secEl.appendChild(buildTable(sec.progression_table, sec.progression_table.headers.length));
      }
      if (sec.concepts) {
        secEl.appendChild(buildConcepts(sec.concepts));
      }
      container.appendChild(secEl);
    });

    grid.appendChild(container);
    clearLevels();
  }

  // ── Phase interaction ──
  function selectPhase(phaseId) {
    if (activePhaseId === phaseId) return;
    activePhaseId = phaseId;
    updateWheel();
    renderPhase(data.phases.find(p => p.id === phaseId));
  }

  function clearSel() {
    activePhaseId = null;
    updateWheel();
    if (data.overview) renderOverview(data.overview);
  }

  function updateWheel() {
    svg.selectAll('.node-g').each(function(d) {
      d3.select(this).classed('phase-active', d.phase.id === activePhaseId);
    });
  }

  function renderPhase(phase) {
    document.getElementById('phase-header').innerHTML = `
      <span class="badge" style="background:${phase.color}33;color:${phase.light};border:1px solid ${phase.color}66">${phase.criterion}</span>
      <div class="phase-name" style="color:${phase.light};margin-top:4px;">${phase.label.replace(/\n/g,' ')}</div>`;

    const descEl = document.getElementById('phase-desc');
    descEl.style.display = '';
    descEl.textContent = phase.description;

    renderLevels(phase);

    const grid = document.getElementById('node-grid');
    grid.innerHTML = '';

    phase.nodes.forEach(node => {
      const card = document.createElement('div');
      card.className = 'node-card';
      card.style.borderColor = phase.color + '55';
      const prog = node.progression || {};
      card.innerHTML = `
        <div class="node-card-label" style="color:${phase.light}">${node.label} <span style="font-weight:400;opacity:0.65;font-size:11px;">${node.detail}</span></div>
        <div class="node-card-detail">${node.strand_full || ''}</div>
        <div class="node-card-divider"></div>
        <div class="node-card-desc">${node.description || ''}</div>
        <div class="node-card-divider"></div>
        <div class="node-prog">
          <div class="node-prog-row"><span class="node-prog-year">Y1</span><span class="node-prog-text">${prog.y1 || ''}</span></div>
          <div class="node-prog-row"><span class="node-prog-year">Y3</span><span class="node-prog-text">${prog.y3 || ''}</span></div>
          <div class="node-prog-row"><span class="node-prog-year">Y5</span><span class="node-prog-text">${prog.y5 || ''}</span></div>
        </div>`;
      grid.appendChild(card);
    });
  }

  // Start on overview
  clearSel();
}

// ── Foundations panel renderer (module scope) ──
function renderFoundations(fd, tabIndex) {
  const list = document.getElementById('levels-list');
  list.innerHTML = '';

  if (tabIndex === 0 && fd.learner_profile) {
    const lp = fd.learner_profile;
    const intro = document.createElement('p');
    intro.className = 'found-intro';
    intro.textContent = lp.intro;
    list.appendChild(intro);
    const wrap = document.createElement('div');
    wrap.className = 'found-attr';
    lp.attributes.forEach(attr => {
      const card = document.createElement('div');
      card.className = 'found-attr-card';
      card.innerHTML = `<div class="found-attr-name">${attr.name}</div><div class="found-attr-desc">${attr.description}</div>`;
      wrap.appendChild(card);
    });
    list.appendChild(wrap);

  } else if (tabIndex === 1 && fd.soi_construction) {
    const soi = fd.soi_construction;
    const intro = document.createElement('p');
    intro.className = 'found-intro';
    intro.textContent = soi.intro;
    list.appendChild(intro);

    const formula = document.createElement('div');
    formula.className = 'found-formula';
    formula.textContent = soi.formula;
    list.appendChild(formula);

    const critLabel = document.createElement('div');
    critLabel.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;';
    critLabel.textContent = 'Quality criteria';
    list.appendChild(critLabel);

    const criteria = document.createElement('div');
    criteria.className = 'found-criteria';
    soi.criteria.forEach(c => {
      const el = document.createElement('div');
      el.className = 'found-criterion';
      el.innerHTML = `<div class="found-criterion-label">${c.label}</div><div class="found-criterion-text">${c.text}</div>`;
      criteria.appendChild(el);
    });
    list.appendChild(criteria);

    const conn = document.createElement('div');
    conn.className = 'found-connection';
    conn.textContent = soi.connection;
    list.appendChild(conn);

    const note = document.createElement('div');
    note.className = 'found-note';
    note.textContent = soi.note;
    list.appendChild(note);

  } else if (tabIndex === 2 && fd.guiding_questions) {
    const gq = fd.guiding_questions;
    const intro = document.createElement('p');
    intro.className = 'found-intro';
    intro.textContent = gq.intro;
    list.appendChild(intro);

    gq.phases.forEach(ph => {
      const section = document.createElement('div');
      section.className = 'found-gq-phase';
      const label = document.createElement('div');
      label.className = 'found-gq-label';
      label.textContent = ph.label;
      section.appendChild(label);
      const ql = document.createElement('div');
      ql.className = 'found-gq-list';
      ph.questions.forEach(q => {
        const item = document.createElement('div');
        item.className = 'found-gq-item';
        item.textContent = q;
        ql.appendChild(item);
      });
      section.appendChild(ql);
      list.appendChild(section);
    });

  } else if (tabIndex === 3 && fd.service_as_action) {
    const sa = fd.service_as_action;
    const intro = document.createElement('p');
    intro.className = 'found-intro';
    intro.textContent = sa.intro;
    list.appendChild(intro);

    const critLabel = document.createElement('div');
    critLabel.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;';
    critLabel.textContent = 'Key principles';
    list.appendChild(critLabel);
    const principles = document.createElement('div');
    principles.className = 'found-criteria';
    sa.principles.forEach(p => {
      const el = document.createElement('div');
      el.className = 'found-criterion';
      el.innerHTML = `<div class="found-criterion-label">${p.label}</div><div class="found-criterion-text">${p.text}</div>`;
      principles.appendChild(el);
    });
    list.appendChild(principles);

    const outLabel = document.createElement('div');
    outLabel.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px;';
    outLabel.textContent = 'Learning outcomes';
    list.appendChild(outLabel);
    const outIntro = document.createElement('div');
    outIntro.style.cssText = 'font-size:10.5px;color:var(--muted);margin-bottom:6px;font-style:italic;';
    outIntro.textContent = sa.outcomes_intro;
    list.appendChild(outIntro);
    const outList = document.createElement('div');
    outList.className = 'found-gq-list';
    sa.outcomes.forEach(o => {
      const item = document.createElement('div');
      item.className = 'found-gq-item';
      item.textContent = o;
      outList.appendChild(item);
    });
    list.appendChild(outList);

    const saNote = document.createElement('div');
    saNote.className = 'found-note';
    saNote.style.marginTop = '8px';
    saNote.textContent = sa.note;
    list.appendChild(saNote);

  } else if (tabIndex === 4 && fd.interdisciplinary) {
    const id = fd.interdisciplinary;
    const intro = document.createElement('p');
    intro.className = 'found-intro';
    intro.textContent = id.intro;
    list.appendChild(intro);

    const defBox = document.createElement('div');
    defBox.className = 'found-formula';
    defBox.style.fontWeight = '400';
    defBox.style.fontStyle = 'italic';
    defBox.textContent = id.definition;
    list.appendChild(defBox);

    const qLabel = document.createElement('div');
    qLabel.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;';
    qLabel.textContent = 'Three key qualities';
    list.appendChild(qLabel);
    const qualities = document.createElement('div');
    qualities.className = 'found-criteria';
    id.qualities.forEach(q => {
      const el = document.createElement('div');
      el.className = 'found-criterion';
      el.innerHTML = `<div class="found-criterion-label">${q.label}</div><div class="found-criterion-text">${q.text}</div>`;
      qualities.appendChild(el);
    });
    list.appendChild(qualities);

    const whyLabel = document.createElement('div');
    whyLabel.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px;';
    whyLabel.textContent = 'Why it matters';
    list.appendChild(whyLabel);
    const whyList = document.createElement('div');
    whyList.className = 'found-gq-list';
    id.why.forEach(w => {
      const item = document.createElement('div');
      item.className = 'found-gq-item';
      item.textContent = w;
      whyList.appendChild(item);
    });
    list.appendChild(whyList);

    const idNote = document.createElement('div');
    idNote.className = 'found-note';
    idNote.style.marginTop = '8px';
    idNote.textContent = id.note;
    list.appendChild(idNote);
  }
}

  // ── Shared tooltip ──
  function showTip(el, text) {
    const tip = document.getElementById('concept-tip');
    tip.textContent = text;
    tip.style.visibility = 'hidden';
    tip.style.display = 'block';
    requestAnimationFrame(() => {
      const r  = el.getBoundingClientRect();
      const tw = tip.offsetWidth;
      const th = tip.offsetHeight;
      let left = r.left + r.width/2 - tw/2;
      left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
      const top = r.top - th - 8;
      tip.style.left = left + 'px';
      tip.style.top  = (top < 8 ? r.bottom + 8 : top) + 'px';
      tip.style.visibility = 'visible';
    });
  }
  function hideTip() { document.getElementById('concept-tip').style.display = 'none'; }
